name: fameo_x
description: "Fameo X - A modern social media Flutter app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6
  get_storage: ^2.1.1

  # UI & fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.1

  # Grid
  flutter_staggered_grid_view: ^0.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/home/
